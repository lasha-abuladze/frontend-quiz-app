<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/images/favicon-32x32.png" type="image/png">

    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

    <title>Frontend Quiz App</title>
</head>
<body>

    <main class="main">

        <header class="header">

            <figure class="chosen-quiz--logo display-none">
                <img class="chosen-quiz--icon" src="./assets/images/icon-html.svg" alt="icon-html">
                <figcaption class="chosen-quiz--topic">HTML</figcaption>
            </figure>

            <div class="theme-switcher">

                <div class="sun-icons theme-switcher--icons-div switch-theme">
                    <img class="theme-switcher--icon icon--sun-light display-none" src="./assets/images/icon-sun-light.svg" alt="sun-light-icon">
                    <img class="theme-switcher--icon icon--sun-dark" src="./assets/images/icon-sun-dark.svg" alt="sun-dark--icon">
                </div>

                <div class="switcher-icon switch-theme">
                    <div class="switcher-circle"></div>
                </div>

                <div class="moon-icons theme-switcher--icons-div switch-theme">
                    <img class="theme-switcher--icon icon--moon-light display-none" src="./assets/images/icon-moon-light.svg" alt="moon-light--icon">
                    <img src="./assets/images/icon-moon-dark.svg" alt="moon-dark--icon" class="theme-switcher--icon icon--moon-dark">
                </div>

            </div>
        </header>

        <section class="section--welcom display-none">

            <hgroup>
                <h1>
                    Welcome to the
                    <span>Frontend Quiz!</span>
                </h1>
                <p class="ind">Pick a subject to get started.</p>
            </hgroup>

            <ul class="quiz-topics-list">
                <li class="quiz-topics-list--li">
                    <img class="icon--html" src="./assets/images/icon-html.svg" alt="icon-html">
                    <span>HTML</span>
                </li>

                <li class="quiz-topics-list--li">
                    <img class="icon--css" src="./assets/images/icon-css.svg" alt="icon-css">
                    <span>CSS</span>
                </li>

                <li class="quiz-topics-list--li">
                    <img class="icon--js" src="./assets/images/icon-js.svg" alt="icon-js">
                    <span>Javascript</span>
                </li>

                <li class="quiz-topics-list--li">
                    <img class="icon--accessibility" src="assets/images/icon-accessibility.svg" alt="icon-accessibility">
                    <span>Accessibility</span>
                </li>
            </ul>

        </section>

        <section class="section-quiz">

            <div class="div--question">
                <p class="question-number">
                    Question 6 of 10
                </p>
                
                <p class="question">
                    Which of these color contrast ratios defines the 
                    minimum WCAG 2.1 Level AA requirement for normal 
                    text?
                </p>

                <div class="questions-number--ind-background">
                    <div class="questions-number--ind"></div>
                </div>

            </div>

            <form class="form--answers">
                
                <ul class="answers-list">

                    <li class="answers-list--li">
                        <input type="radio" id="1" name="answer">
                        <label class="answers-list--label" for="1">
                            <b class="answer-number">
                                a
                            </b>
                            4.5 : 1
                        </label>
                    </li>

                    <li class="answers-list--li">
                        <input type="radio" id="2" name="answer">
                        <label class="answers-list--label" for="2">
                            <b class="answer-number">
                                b
                            </b>
                            3 : 1
                        </label>
                    </li>

                    <li class="answers-list--li">
                        <input type="radio" id="3" name="answer">
                        <label class="answers-list--label" for="3">
                            <b class="answer-number">
                                c
                            </b>
                            2.5 : 1
                        </label>
                    </li>

                    <li class="answers-list--li">
                        <input type="radio" id="4" name="answer">
                        <label class="answers-list--label" for="4">
                            <b class="answer-number">
                                d
                            </b>
                            5 : 1
                        </label>
                    </li>              
                </ul>

                <input type="submit" class="sabmit-btn form-btn" value="Submit Answer">
                <input type="submit" class="next-question--btn form-btn display-none" value="Next Question">

            </form>

        </section>

    </main>


    <script src="./script.js"></script>
    
</body>
</html>
