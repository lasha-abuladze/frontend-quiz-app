<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/images/favicon-32x32.png" type="image/png">

    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">

    <title>Frontend Quiz App</title>
</head>
<body>

    <main class="main">

        <header class="header">

            <figure class="chosen-quiz--logo display-none">
                <img class="chosen-quiz--icon" src="./assets/images/icon-html.svg" alt="icon-html">
                <figcaption class="chosen-quiz--topic">HTML</figcaption>
            </figure>

            <div class="theme-switcher">

                <div class="sun-icons theme-switcher--icons-div switch-theme">
                    <img class="theme-switcher--icon icon--sun-light display-none" src="./assets/images/icon-sun-light.svg" alt="sun-light-icon">
                    <img class="theme-switcher--icon icon--sun-dark" src="./assets/images/icon-sun-dark.svg" alt="sun-dark--icon">
                </div>

                <div class="switcher-icon switch-theme">
                    <div class="switcher-circle"></div>
                </div>

                <div class="moon-icons theme-switcher--icons-div switch-theme">
                    <img class="theme-switcher--icon icon--moon-light display-none" src="./assets/images/icon-moon-light.svg" alt="moon-light--icon">
                    <img src="./assets/images/icon-moon-dark.svg" alt="moon-dark--icon" class="theme-switcher--icon icon--moon-dark">
                </div>

            </div>
        </header>

    </main>


    <script src="./script.js"></script>
    
</body>
</html>
